name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test Fullstack App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Backend Dependencies
      run: npm ci

    - name: Run Backend Tests (NestJS)
      run: npm run test

    - name: Build Backend (NestJS)
      run: npm run build

    - name: Install Frontend Dependencies
      working-directory: ./movie-collection-frontend
      run: npm ci

    - name: Build Frontend (React + Vite)
      working-directory: ./movie-collection-frontend
      run: npm run build
